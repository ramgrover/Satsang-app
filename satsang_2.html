<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Raadha Raadha — Satsang Kram</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#faf8ff;color:#1a1a2e;min-height:100vh}
.app{padding:1.5rem 1rem 3rem;max-width:480px;margin:0 auto}
.header{text-align:center;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid #e8e0f7}
.header h1{font-size:24px;font-weight:600;color:#3C3489;margin-bottom:4px}
.header .sub{font-size:13px;color:#888;margin-top:2px}
.card{background:#fff;border:1px solid #e8e0f7;border-radius:14px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.sec-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
input[type=text],input[type=password],input[type=number]{width:100%;padding:10px 12px;border:1px solid #d0c8f0;border-radius:9px;font-size:15px;outline:none;background:#faf8ff;color:#1a1a2e;margin-bottom:10px}
input:focus{border-color:#7F77DD;box-shadow:0 0 0 3px #EEEDFE}
button{padding:10px 18px;border-radius:9px;border:1px solid #d0c8f0;background:#fff;color:#3C3489;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s}
button:hover{background:#EEEDFE;border-color:#AFA9EC}
button.primary{background:#7F77DD;color:#fff;border-color:#534AB7}
button.primary:hover{background:#534AB7}
button.danger{background:#fff;color:#A32D2D;border-color:#F09595}
button.danger:hover{background:#FCEBEB}
.sess-btn{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #e0d8f8;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;transition:all 0.15s;text-align:left}
.sess-btn:hover{background:#f5f0ff;border-color:#AFA9EC}
.sess-btn.selected{border:2px solid #7F77DD;background:#EEEDFE}
.sess-btn .stime{font-size:16px;font-weight:600;color:#3C3489}
.sess-btn .slabel{font-size:12px;color:#888;margin-top:1px}
.sess-btn .scount{font-size:13px;color:#534AB7;font-weight:500;background:#EEEDFE;padding:3px 10px;border-radius:20px;white-space:nowrap}
.sess-btn.selected .scount{background:#d4d0f7}
.locked-badge{font-size:11px;background:#FFF3CD;color:#856404;padding:2px 8px;border-radius:20px;margin-left:6px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem}
.slot{padding:10px 4px;border-radius:10px;border:1px solid #e0d8f8;text-align:center;cursor:pointer;background:#fff;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all 0.12s}
.slot:hover:not(.taken):not(.mine):not(.locked){background:#f5f0ff;border-color:#AFA9EC}
.slot .snum{font-size:18px;font-weight:600;color:#3C3489}
.slot .sname{font-size:10px;color:#888;word-break:break-word;line-height:1.2}
.slot.taken{background:#f7f7f7;border-color:#e0e0e0;cursor:not-allowed;opacity:0.6}
.slot.taken .snum{color:#aaa}
.slot.mine{background:#EEEDFE;border:2px solid #7F77DD;cursor:default}
.slot.mine .snum{color:#3C3489}
.slot.mine .sname{color:#534AB7}
.slot.locked{background:#f7f7f7;border-color:#e0e0e0;cursor:not-allowed}
.slot.locked .snum{color:#bbb}
.release{font-size:9px;color:#534AB7;cursor:pointer;margin-top:1px;text-decoration:underline}
.order-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.order-list li{display:flex;align-items:center;gap:10px;font-size:14px;padding:9px 12px;border-radius:10px;border:1px solid #e8e0f7;background:#faf8ff;color:#1a1a2e}
.badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;background:#EEEDFE;color:#3C3489}
.you-tag{margin-left:auto;font-size:11px;padding:2px 9px;border-radius:20px;background:#EEEDFE;color:#534AB7;font-weight:500}
.status{font-size:13px;color:#888;text-align:center;padding:8px 0;min-height:22px}
.status.ok{color:#0F6E56;font-weight:500}
.status.err{color:#A32D2D}
.status.warn{color:#856404}
.loader{display:inline-block;width:14px;height:14px;border:2px solid #e0d8f8;border-top-color:#7F77DD;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.step{display:none}
.step.active{display:block}
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.refresh-btn{font-size:12px;color:#888;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:8px}
.refresh-btn:hover{background:#f5f0ff;color:#534AB7}
.name-row{display:flex;gap:8px;align-items:flex-start}
.name-row input{margin-bottom:0;flex:1}
.admin-link{text-align:center;margin-top:0.5rem}
.admin-link button{font-size:12px;color:#aaa;border:none;background:none;cursor:pointer;padding:4px}
.admin-link button:hover{color:#534AB7;background:none}
.admin-panel .sess-admin{background:#faf8ff;border:1px solid #e8e0f7;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.admin-panel .sess-admin h4{font-size:14px;font-weight:600;color:#3C3489;margin-bottom:6px}
.admin-panel .sess-admin .row{display:flex;align-items:center;gap:8px;margin-top:6px}
.admin-panel .sess-admin .row input{margin-bottom:0;width:70px;flex:none}
.admin-panel .sess-admin .row span{font-size:13px;color:#888}
.countdown{font-size:12px;padding:4px 10px;border-radius:20px;background:#FFF3CD;color:#856404;display:inline-block;margin-bottom:8px}
.compress-info{font-size:12px;color:#534AB7;background:#EEEDFE;border-radius:8px;padding:6px 10px;margin-bottom:8px;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🌸 Raadha Raadha 🌸</h1>
    <div class="sub" id="dateStr"></div>
    <div class="sub">Aaj ka Satsang Kram</div>
  </div>

  <!-- Step 1: Name -->
  <div id="stepName" class="step active">
    <div class="card">
      <div class="sec-title">Aapka Naam</div>
      <div class="name-row">
        <input type="text" id="nameInput" placeholder="Apna naam likhein..." maxlength="24"/>
        <button class="primary" onclick="submitName()">Aage &#8594;</button>
      </div>
    </div>
    <div class="admin-link">
      <button onclick="showStep('stepAdmin')">&#9881; Admin</button>
    </div>
  </div>

  <!-- Step 2: Session vote -->
  <div id="stepSession" class="step">
    <div class="card">
      <div class="sec-title">Kaunse Satsang Mein Aayenge?</div>
      <div id="sessionList"></div>
      <div id="voteStatus" class="status"></div>
    </div>
  </div>

  <!-- Step 3: Order picking -->
  <div id="stepOrder" class="step">
    <div class="card">
      <div class="sec-title" id="orderTitle">Apna Kram Chunein</div>
      <div id="countdownDiv" style="display:none"></div>
      <div id="compressInfo" style="display:none"></div>
      <div class="grid" id="slotGrid"></div>
      <div id="slotStatus" class="status"></div>
    </div>
    <div class="card" id="orderCard" style="display:none">
      <div class="refresh-row">
        <div class="sec-title" style="margin:0">Aaj Ka Kram</div>
        <button class="refresh-btn" onclick="loadOrder()">&#8635; Refresh</button>
      </div>
      <ul class="order-list" id="orderList"></ul>
    </div>
    <div style="text-align:center;margin-top:1rem">
      <button onclick="goBack()" style="font-size:12px;color:#aaa;border:none;background:none;cursor:pointer">&#8592; Wapas jaayein</button>
    </div>
  </div>

  <!-- Admin step -->
  <div id="stepAdmin" class="step">
    <div class="card">
      <div class="sec-title">Admin Login</div>
      <input type="password" id="pinInput" placeholder="PIN daalen..." maxlength="4"/>
      <div style="display:flex;gap:8px">
        <button class="primary" style="flex:1" onclick="checkPin()">Login</button>
        <button onclick="showStep('stepName')" style="flex:1">Wapas</button>
      </div>
      <div id="pinStatus" class="status"></div>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="stepAdminPanel" class="step">
    <div class="card admin-panel">
      <div class="sec-title">Admin Panel</div>
      <div id="adminSessions"></div>
      <div id="adminStatus" class="status"></div>
    </div>
    <div style="text-align:center;margin-top:0.5rem">
      <button onclick="showStep('stepName')" style="font-size:12px;color:#aaa;border:none;background:none;cursor:pointer">&#8592; Bahar jaayein</button>
    </div>
  </div>
</div>

  {key:'5pm',label:'Sandhya Satsang',time:'5:00 PM',hour:17,min:0}
];

const TODAY=(()=>{const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;})();
let userName='',mySession=null,mySlot=null,accessToken=null,tokenExpiry=0;

document.getElementById('dateStr').textContent=new Date().toLocaleDateString('hi-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function pemToBuf(pem){
  const b64=pem.replace(/-----[^-]+-----/g,'').replace(/\s/g,'');
  const bin=atob(b64);const buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);return buf.buffer;
}

async function getToken(){
  if(accessToken&&Date.now()<tokenExpiry)return accessToken;
  const now=Math.floor(Date.now()/1000);
  const enc=s=>btoa(JSON.stringify(s)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const header=enc({alg:'RS256',typ:'JWT'});
  const claim=enc({iss:SERVICE_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now});
  const unsigned=header+'.'+claim;
  const key=await crypto.subtle.importKey('pkcs8',pemToBuf(PRIVATE_KEY),{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(unsigned));
  const sigB64=btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const jwt=unsigned+'.'+sigB64;
  const res=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const data=await res.json();
  if(!data.access_token)throw new Error(data.error_description||data.error||'Token failed');
  accessToken=data.access_token;tokenExpiry=Date.now()+3500000;return accessToken;
}

async function sheetsGet(range){
  const tok=await getToken();
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`,{headers:{Authorization:'Bearer '+tok}});
  return res.json();
}
async function sheetsUpdate(range,values){
  const tok=await getToken();
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
}
async function sheetsAppend(range,values){
  const tok=await getToken();
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
}

function showStep(id){document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function submitName(){
  const n=document.getElementById('nameInput').value.trim();
  if(!n){alert('Pehle apna naam likhein');return;}
  userName=n;showStep('stepSession');loadSessions();
}
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitName();});

// Returns minutes until session starts (negative if past)
function minsUntil(sess){
  const now=new Date();
  const start=new Date();start.setHours(sess.hour,sess.min,0,0);
  return (start-now)/60000;
}

// Is session locked (within 15 min of start or already started)
function isLocked(sess){return minsUntil(sess)<=LOCK_MINUTES;}

function countdownText(sess){
  const m=Math.round(minsUntil(sess));
  if(m<=0)return null;
  if(m<=LOCK_MINUTES)return `${m} minute mein lock ho jaayega`;
  return null;
}

async function loadSessions(){
  const list=document.getElementById('sessionList');
  list.innerHTML='<div class="status"><span class="loader"></span> Load ho raha hai...</div>';
  try{
    const[voteData,extraData]=await Promise.all([sheetsGet('Votes!A:C'),sheetsGet('Extra!A:C')]);
    const vRows=voteData.values||[];
    const eRows=extraData.values||[];
    const counts={};SESSIONS.forEach(s=>counts[s.key]=0);
    vRows.forEach(r=>{if(r[0]===TODAY&&r[2])counts[r[2]]=(counts[r[2]]||0)+1;});
    const extras={};
    eRows.forEach(r=>{if(r[0]===TODAY&&r[1]&&r[2])extras[r[1]]=parseInt(r[2])||0;});
    const myVoteRow=vRows.find(r=>r[0]===TODAY&&r[1]===userName);
    mySession=myVoteRow?myVoteRow[2]:null;
    list.innerHTML='';
    SESSIONS.forEach(s=>{
      const total=Math.max(counts[s.key],MIN_SPOTS)+(extras[s.key]||0);
      const locked=isLocked(s);
      const btn=document.createElement('button');
      btn.className='sess-btn'+(mySession===s.key?' selected':'');
      btn.innerHTML=`<div><div class="stime">${s.time}${locked?'<span class="locked-badge">Locked</span>':''}</div><div class="slabel">${s.label}</div></div><span class="scount">${counts[s.key]} vote · ${total} spots</span>`;
      if(!locked||mySession===s.key)btn.onclick=()=>vote(s.key);
      else btn.style.opacity='0.6';
      list.appendChild(btn);
    });
    if(mySession){
      document.getElementById('voteStatus').textContent='Aapne haan kaha — neeche kram chunein';
      document.getElementById('voteStatus').className='status ok';
      showStep('stepOrder');loadOrder();
    }
  }catch(e){list.innerHTML=`<div class="status err">Error: ${e.message}</div>`;}
}

async function vote(sessKey){
  const vs=document.getElementById('voteStatus');
  const sess=SESSIONS.find(s=>s.key===sessKey);
  if(isLocked(sess)&&mySession!==sessKey){vs.textContent='Yeh satsang lock ho gaya hai';vs.className='status err';return;}
  vs.innerHTML='<span class="loader"></span> Vote ho raha hai...';
  try{
    const data=await sheetsGet('Votes!A:C');
    const rows=data.values||[];
    const existing=rows.findIndex(r=>r[0]===TODAY&&r[1]===userName);
    if(existing>=0){await sheetsUpdate(`Votes!A${existing+1}:C${existing+1}`,[[TODAY,userName,sessKey]]);}
    else{await sheetsAppend('Votes!A:C',[[TODAY,userName,sessKey]]);}
    mySession=sessKey;
    vs.textContent='Raadha Raadha! Vote ho gaya 🌸';vs.className='status ok';
    setTimeout(()=>{showStep('stepOrder');loadOrder();},800);
  }catch(e){vs.textContent='Error: '+e.message;vs.className='status err';}
}

function goBack(){mySession=null;showStep('stepSession');loadSessions();}

async function loadOrder(){
  const sess=SESSIONS.find(s=>s.key===mySession);
  document.getElementById('orderTitle').textContent=`${sess.time} — Apna Kram Chunein`;
  const grid=document.getElementById('slotGrid');
  const ss=document.getElementById('slotStatus');
  grid.innerHTML='<div class="status" style="grid-column:1/-1"><span class="loader"></span> Load ho raha hai...</div>';

  // countdown
  const cdDiv=document.getElementById('countdownDiv');
  const ct=countdownText(sess);
  if(ct){cdDiv.style.display='block';cdDiv.innerHTML=`<div class="countdown">&#9201; ${ct}</div>`;}
  else{cdDiv.style.display='none';}

  try{
    const[voteData,orderData,extraData]=await Promise.all([sheetsGet('Votes!A:C'),sheetsGet('Order!A:D'),sheetsGet('Extra!A:C')]);
    const vRows=voteData.values||[];
    const oRows=orderData.values||[];
    const eRows=extraData.values||[];
    const voteCount=vRows.filter(r=>r[0]===TODAY&&r[2]===mySession).length;
    const extraRow=eRows.find(r=>r[0]===TODAY&&r[1]===mySession);
    const extraSpots=extraRow?parseInt(extraRow[2])||0:0;
    const locked=isLocked(sess);

    // total spots: if locked, compress to actual voters; else max(votes, MIN_SPOTS) + extra
    let total;
    if(locked){
      total=Math.max(voteCount,1)+extraSpots;
    } else {
      total=Math.max(voteCount,MIN_SPOTS)+extraSpots;
    }

    const todayOrders=oRows.filter(r=>r[0]===TODAY&&r[2]===mySession&&r[1]&&r[3]);
    const slotMap={};todayOrders.forEach(r=>slotMap[parseInt(r[1])]=r[3]);
    mySlot=null;
    todayOrders.forEach(r=>{if(r[3]===userName)mySlot=parseInt(r[1]);});

    // compress: if locked and mySlot > total, auto-reassign to total
    if(locked&&mySlot&&mySlot>total){
      // find new available slot at end
      let newSlot=total;
      while(slotMap[newSlot]&&slotMap[newSlot]!==userName&&newSlot>1)newSlot--;
      if(!slotMap[newSlot]||slotMap[newSlot]===userName){
        const meRow=oRows.findIndex(r=>r[0]===TODAY&&r[2]===mySession&&r[3]===userName);
        if(meRow>=0){await sheetsUpdate(`Order!A${meRow+1}:D${meRow+1}`,[[TODAY,newSlot,mySession,userName]]);}
        mySlot=newSlot;
        slotMap[newSlot]=userName;
      }
    }

    // show compress info
    const ciDiv=document.getElementById('compressInfo');
    if(locked&&voteCount<MIN_SPOTS){
      ciDiv.style.display='block';
      ciDiv.innerHTML=`<div class="compress-info">Aaj ${voteCount} sakhiyan hain — kram ${voteCount} tak adjust ho gaya</div>`;
    } else {ciDiv.style.display='none';}

    grid.innerHTML='';
    for(let i=1;i<=total;i++){
      const taken=slotMap[i];const isMe=mySlot===i;
      const div=document.createElement('div');
      div.className='slot'+(isMe?' mine':taken?' taken':'');
      div.innerHTML=`<span class="snum">${i}</span><span class="sname">${taken||''}</span>`;
      if(isMe)div.innerHTML+=`<span class="release" onclick="releaseSlot()">chhoden</span>`;
      if(!taken&&!isMe)div.onclick=()=>pickSlot(i);
      grid.appendChild(div);
    }

    if(mySlot){ss.textContent=`Aap ${mySlot}ve kram par hain. Raadha Raadha! 🌸`;ss.className='status ok';}
    else{ss.textContent='Apna koi bhi number chunein';ss.className='status';}

    const orderCard=document.getElementById('orderCard');
    const orderList=document.getElementById('orderList');
    if(todayOrders.length>0){
      orderCard.style.display='block';
      const sorted=[...todayOrders].sort((a,b)=>parseInt(a[1])-parseInt(b[1]));
      orderList.innerHTML=sorted.map(r=>`<li><span class="badge">${r[1]}</span>${r[3]}${r[3]===userName?'<span class="you-tag">aap</span>':''}</li>`).join('');
    }else{orderCard.style.display='none';}
  }catch(e){grid.innerHTML=`<div class="status err" style="grid-column:1/-1">Error: ${e.message}</div>`;}
}

async function pickSlot(n){
  const ss=document.getElementById('slotStatus');
  ss.innerHTML='<span class="loader"></span>';
  try{
    const orderData=await sheetsGet('Order!A:D');
    const oRows=orderData.values||[];
    const already=oRows.find(r=>r[0]===TODAY&&r[2]===mySession&&parseInt(r[1])===n&&r[3]);
    if(already){ss.textContent='Yeh spot le liya gaya, doosra chunein';ss.className='status err';setTimeout(loadOrder,1200);return;}
    const meRow=oRows.findIndex(r=>r[0]===TODAY&&r[2]===mySession&&r[3]===userName);
    if(meRow>=0){await sheetsUpdate(`Order!A${meRow+1}:D${meRow+1}`,[[TODAY,n,mySession,userName]]);}
    else{await sheetsAppend('Order!A:D',[[TODAY,n,mySession,userName]]);}
    mySlot=n;ss.textContent='Ho gaya! Raadha Raadha! 🌸';ss.className='status ok';
    setTimeout(loadOrder,700);
  }catch(e){ss.textContent='Error: '+e.message;ss.className='status err';}
}

async function releaseSlot(){
  try{
    const orderData=await sheetsGet('Order!A:D');
    const oRows=orderData.values||[];
    const meRow=oRows.findIndex(r=>r[0]===TODAY&&r[2]===mySession&&r[3]===userName);
    if(meRow>=0){await sheetsUpdate(`Order!A${meRow+1}:D${meRow+1}`,[[TODAY,'',mySession,'']]);}
    mySlot=null;loadOrder();
  }catch(e){}
}

// Admin
function checkPin(){
  const p=document.getElementById('pinInput').value.trim();
  if(p===ADMIN_PIN){showStep('stepAdminPanel');loadAdminPanel();}
  else{document.getElementById('pinStatus').textContent='Galat PIN';document.getElementById('pinStatus').className='status err';}
}
document.getElementById('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPin();});

async function loadAdminPanel(){
  const div=document.getElementById('adminSessions');
  const st=document.getElementById('adminStatus');
  div.innerHTML='<div class="status"><span class="loader"></span> Load ho raha hai...</div>';
  try{
    const[voteData,orderData,extraData]=await Promise.all([sheetsGet('Votes!A:C'),sheetsGet('Order!A:D'),sheetsGet('Extra!A:C')]);
    const vRows=voteData.values||[];
    const oRows=orderData.values||[];
    const eRows=extraData.values||[];
    div.innerHTML='';
    SESSIONS.forEach(s=>{
      const voteCount=vRows.filter(r=>r[0]===TODAY&&r[2]===s.key).length;
      const voters=vRows.filter(r=>r[0]===TODAY&&r[2]===s.key).map(r=>r[1]);
      const extraRow=eRows.find(r=>r[0]===TODAY&&r[1]===s.key);
      const extraVal=extraRow?parseInt(extraRow[2])||0:0;
      const locked=isLocked(s);
      const total=locked?Math.max(voteCount,1)+extraVal:Math.max(voteCount,MIN_SPOTS)+extraVal;
      const pickedRows=oRows.filter(r=>r[0]===TODAY&&r[2]===s.key&&r[1]&&r[3]).sort((a,b)=>parseInt(a[1])-parseInt(b[1]));
      const pickedNames=pickedRows.map(r=>r[3]);
      // who voted but hasn't picked yet
      const notPicked=voters.filter(v=>!pickedNames.includes(v));

      const orderHTML=pickedRows.length>0
        ?`<div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">${pickedRows.map(r=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 8px;background:#fff;border-radius:8px;border:1px solid #e8e0f7"><span style="width:22px;height:22px;border-radius:50%;background:#EEEDFE;color:#3C3489;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0">${r[1]}</span>${r[3]}</div>`).join('')}</div>`
        :`<div style="font-size:12px;color:#aaa;margin-top:6px">Abhi kisi ne spot nahi chuna</div>`;

      const notPickedHTML=notPicked.length>0
        ?`<div style="margin-top:8px"><div style="font-size:11px;color:#aaa;margin-bottom:4px">Vote diya, spot nahi chuna:</div>${notPicked.map(n=>`<span style="display:inline-block;font-size:12px;background:#fff3cd;color:#856404;padding:2px 8px;border-radius:20px;margin:2px">${n}</span>`).join('')}</div>`
        :'';

      const d=document.createElement('div');
      d.className='sess-admin';
      d.innerHTML=`
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <h4 style="margin:0">${s.time} — ${s.label}${locked?' 🔒':''}</h4>
          <button class="refresh-btn" onclick="loadAdminPanel()" style="font-size:11px">&#8635;</button>
        </div>
        <div style="font-size:13px;color:#888;margin-bottom:4px">${voteCount} votes · ${pickedRows.length} spot chune · ${total} total</div>
        ${orderHTML}
        ${notPickedHTML}
        <div class="row" style="margin-top:10px;padding-top:8px;border-top:1px solid #e8e0f7">
          <span>Extra spots:</span>
          <input type="number" id="extra_${s.key}" value="${extraVal}" min="0" max="50"/>
          <button onclick="saveExtra('${s.key}')" class="primary" style="padding:6px 12px;font-size:13px">Save</button>
        </div>`;
      div.appendChild(d);
    });
  }catch(e){div.innerHTML=`<div class="status err">Error: ${e.message}</div>`;}
}

async function saveExtra(sessKey){
  const st=document.getElementById('adminStatus');
  const val=parseInt(document.getElementById('extra_'+sessKey).value)||0;
  st.innerHTML='<span class="loader"></span> Save ho raha hai...';
  try{
    const eData=await sheetsGet('Extra!A:C');
    const eRows=eData.values||[];
    const eRow=eRows.findIndex(r=>r[0]===TODAY&&r[1]===sessKey);
    if(eRow>=0){await sheetsUpdate(`Extra!A${eRow+1}:C${eRow+1}`,[[TODAY,sessKey,val]]);}
    else{await sheetsAppend('Extra!A:C',[[TODAY,sessKey,val]]);}
    st.textContent='Ho gaya! Extra spots save ho gaye 🌸';st.className='status ok';
    setTimeout(()=>{st.textContent='';loadAdminPanel();},1500);
  }catch(e){st.textContent='Error: '+e.message;st.className='status err';}
}
</script>
